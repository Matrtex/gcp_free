name: 构建并发布 Windows EXE

on:
  workflow_dispatch:
    inputs:
      version:
        description: "发布版本号，例如 v1.2.3；留空时只生成手动构建产物"
        required: false
        type: string
      create_release:
        description: "是否自动创建 GitHub Release"
        required: true
        default: false
        type: boolean
      draft:
        description: "创建 Release 时是否使用草稿状态"
        required: true
        default: true
        type: boolean
      release_notes:
        description: "可选，Release 说明"
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  actions: read
  contents: write

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 等待自动检查通过
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const targetSha = context.sha;
            const defaultBranch = context.payload.repository?.default_branch || 'master';
            const maxAttempts = 30;
            const delayMs = 20000;

            if (context.eventName === 'workflow_dispatch' && context.ref.replace('refs/heads/', '') !== defaultBranch) {
              core.setFailed(`手动发布只允许从默认分支 ${defaultBranch} 触发，当前为 ${context.ref}。`);
              return;
            }

            function summarizeRun(run) {
              return `#${run.run_number} ${run.status}/${run.conclusion || 'pending'} ${run.head_branch} ${run.html_url}`;
            }

            for (let attempt = 1; attempt <= maxAttempts; attempt += 1) {
              const response = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id: 'ci.yml',
                head_sha: targetSha,
                per_page: 20,
              });

              const runs = response.data.workflow_runs
                .filter((run) => run.head_branch === defaultBranch);

              const successfulRun = runs.find(
                (run) => run.status === 'completed' && run.conclusion === 'success'
              );
              if (successfulRun) {
                core.info(`检测到当前提交的自动检查已通过：${summarizeRun(successfulRun)}`);
                return;
              }

              const inProgressRuns = runs.filter((run) => run.status !== 'completed');
              const failedRuns = runs.filter(
                (run) => run.status === 'completed' && run.conclusion && run.conclusion !== 'success'
              );

              if (attempt === maxAttempts) {
                const details = runs.length
                  ? runs.map(summarizeRun).join('\n')
                  : '未找到当前提交在默认分支上的自动检查记录。';
                core.setFailed(
                  `发布前校验失败：当前提交 ${targetSha} 对应的“自动检查”尚未在 ${defaultBranch} 上成功。\n${details}`
                );
                return;
              }

              if (inProgressRuns.length > 0) {
                core.info(
                  `第 ${attempt}/${maxAttempts} 次检查：自动检查仍在运行，等待 ${(delayMs / 1000).toFixed(0)} 秒后继续。`
                );
              } else if (failedRuns.length > 0) {
                core.info(
                  `第 ${attempt}/${maxAttempts} 次检查：发现失败的自动检查，但尚未看到成功结果，等待 ${(delayMs / 1000).toFixed(0)} 秒后继续。`
                );
              } else {
                core.info(
                  `第 ${attempt}/${maxAttempts} 次检查：尚未发现当前提交在 ${defaultBranch} 上的自动检查记录，等待 ${(delayMs / 1000).toFixed(0)} 秒后继续。`
                );
              }

              await new Promise((resolve) => setTimeout(resolve, delayMs));
            }

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 安装依赖与打包工具
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: 准备代码签名证书
        if: secrets.WINDOWS_CODESIGN_CERT_BASE64 != '' && secrets.WINDOWS_CODESIGN_CERT_PASSWORD != ''
        shell: pwsh
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP "codesign.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String("${{ secrets.WINDOWS_CODESIGN_CERT_BASE64 }}"))
          $timestampUrl = "${{ vars.WINDOWS_CODESIGN_TIMESTAMP_URL }}"
          if ([string]::IsNullOrWhiteSpace($timestampUrl)) {
            $timestampUrl = "http://timestamp.digicert.com"
          }
          "SIGN_PFX_PATH=$certPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "SIGN_PFX_PASSWORD=${{ secrets.WINDOWS_CODESIGN_CERT_PASSWORD }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "SIGN_TIMESTAMP_URL=$timestampUrl" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: 运行测试
        run: |
          python -m py_compile gcp.py gcp_clients.py gcp_config.py gcp_doctor.py gcp_logging.py gcp_models.py gcp_state.py scripts/build_exe.py
          python -m unittest discover -s tests -v

      - name: 计算构建版本
        shell: pwsh
        run: |
          $eventName = "${{ github.event_name }}"
          $inputVersion = "${{ inputs.version }}"
          $createRelease = "${{ inputs.create_release }}"
          $draftRelease = "${{ inputs.draft }}"
          $releaseNotes = @"
          ${{ inputs.release_notes }}
          "@

          if ($eventName -eq "push") {
            $version = "${{ github.ref_name }}"
            $createRelease = "true"
            $draftRelease = "false"
            $releaseNotes = "自动从 tag ${version} 构建并发布 Windows EXE。"
          } elseif ([string]::IsNullOrWhiteSpace($inputVersion)) {
            $version = "manual-${{ github.run_number }}-${{ github.sha }}".Substring(0, 22)
          } else {
            $version = $inputVersion.Trim()
          }

          if ($createRelease -eq "true" -and [string]::IsNullOrWhiteSpace($inputVersion) -and $eventName -ne "push") {
            throw "创建 Release 时必须提供 version。"
          }

          "BUILD_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CREATE_RELEASE=$createRelease" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_DRAFT=$draftRelease" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_NOTES<<EOF" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          $releaseNotes | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "EOF" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: 构建 EXE
        shell: pwsh
        run: |
          $command = @(
            "python",
            "scripts/build_exe.py",
            "--clean",
            "--version",
            "${{ env.BUILD_VERSION }}"
          )
          if (-not [string]::IsNullOrWhiteSpace($env:SIGN_PFX_PATH)) {
            $command += @("--sign-pfx", $env:SIGN_PFX_PATH, "--sign-password", $env:SIGN_PFX_PASSWORD)
            if (-not [string]::IsNullOrWhiteSpace($env:SIGN_TIMESTAMP_URL)) {
              $command += @("--timestamp-url", $env:SIGN_TIMESTAMP_URL)
            }
          }
          & $command[0] $command[1..($command.Length - 1)]

      - name: 清理代码签名证书
        if: always() && env.SIGN_PFX_PATH != ''
        shell: pwsh
        run: |
          if (Test-Path $env:SIGN_PFX_PATH) {
            Remove-Item -LiteralPath $env:SIGN_PFX_PATH -Force
          }

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: gcp-free-windows-exe-${{ env.BUILD_VERSION }}
          path: dist/release/*
          if-no-files-found: error

      - name: 创建 GitHub Release
        if: env.CREATE_RELEASE == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BUILD_VERSION }}
          name: ${{ env.BUILD_VERSION }}
          draft: ${{ env.RELEASE_DRAFT == 'true' }}
          body: ${{ env.RELEASE_NOTES }}
          files: |
            dist/release/*.zip
