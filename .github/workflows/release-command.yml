name: 评论指令触发 EXE 构建

on:
  issue_comment:
    types:
      - created

permissions:
  actions: write
  contents: read
  issues: write
  pull-requests: write

jobs:
  dispatch-release:
    if: >
      github.event.issue.pull_request &&
      (startsWith(github.event.comment.body, '/build-exe') || startsWith(github.event.comment.body, '/release-exe')) &&
      github.event.comment.user.type != 'Bot' &&
      (
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR'
      )
    runs-on: ubuntu-latest

    steps:
      - name: 解析评论指令
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const body = (context.payload.comment.body || '').trim();
            const [command, version = ''] = body.split(/\s+/, 2);
            const createRelease = command === '/release-exe';
            if (createRelease && !version) {
              core.setFailed('使用 /release-exe 时必须附带版本号，例如 /release-exe v1.2.3');
              return;
            }
            core.setOutput('version', version);
            core.setOutput('create_release', String(createRelease));
            core.setOutput('draft', createRelease ? 'false' : 'true');
            core.setOutput('command', command);

      - name: 触发发布工作流
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'release-exe.yml',
              ref: context.payload.repository.default_branch,
              inputs: {
                version: '${{ steps.parse.outputs.version }}',
                create_release: '${{ steps.parse.outputs.create_release }}',
                draft: '${{ steps.parse.outputs.draft }}',
                release_notes: '由评论指令 ${{ steps.parse.outputs.command }} 触发。'
              }
            });

      - name: 回复触发结果
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.parse.outputs.version }}';
            const createRelease = '${{ steps.parse.outputs.create_release }}' === 'true';
            const summary = createRelease
              ? `已触发 EXE 发布工作流，目标版本 \`${version}\`。`
              : `已触发 EXE 构建工作流${version ? `，版本标识 \`${version}\`` : ''}。`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: summary
            });

      - name: 回复指令错误
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '指令格式无效。可用格式：`/build-exe`、`/build-exe v1.2.3`、`/release-exe v1.2.3`'
            });
